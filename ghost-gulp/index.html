<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Ghost-Gulp</title>
<style>
  :root {
    --bg: #05030a;
    --fg: #e8e6ff;
    --accent: #b388ff;
    --danger: #ff4d6d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  #game {
    position: fixed;
    inset: 0;
    display: block;
    cursor: grab;
    background: radial-gradient(ellipse at center, #0f0a1f 0%, #05030a 70%, #000 100%);
  }
  #game.dragging { cursor: grabbing; }
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    z-index: 10;
    font-variant-numeric: tabular-nums;
  }
  .pill {
    background: rgba(20, 10, 40, 0.6);
    border: 1px solid rgba(179, 136, 255, 0.3);
    border-radius: 999px;
    padding: 8px 16px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-size: 14px;
    letter-spacing: 0.5px;
  }
  .pill .label {
    opacity: 0.6;
    font-size: 10px;
    text-transform: uppercase;
    margin-right: 6px;
  }
  .pill .val { font-weight: 600; }
  #stage-label {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
    pointer-events: none;
    z-index: 10;
  }
  #milestone {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 48px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.4s, transform 0.4s cubic-bezier(0.2, 1.5, 0.4, 1);
    text-shadow: 0 0 30px var(--accent), 0 0 60px var(--accent);
    white-space: nowrap;
  }
  #milestone.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, rgba(20, 10, 40, 0.85), rgba(5, 3, 10, 0.95));
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 100;
    transition: opacity 0.4s;
    padding: 20px;
    text-align: center;
  }
  #overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  #overlay h1 {
    font-size: clamp(40px, 10vw, 72px);
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #overlay .tagline {
    font-size: 14px;
    opacity: 0.6;
    margin-bottom: 32px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #overlay .stats {
    margin: 20px 0 28px;
    font-size: 16px;
    line-height: 1.8;
    opacity: 0.9;
  }
  #overlay .stats .big {
    display: block;
    font-size: 48px;
    font-weight: 800;
    color: var(--accent);
    margin-top: 4px;
  }
  #overlay .skin-unlock {
    margin: 16px 0;
    padding: 12px 20px;
    border: 1px solid gold;
    border-radius: 12px;
    background: rgba(255, 215, 0, 0.1);
    color: gold;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
    50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }
  }
  button {
    background: var(--accent);
    color: #0a0514;
    border: none;
    border-radius: 999px;
    padding: 16px 40px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 30px rgba(179, 136, 255, 0.4);
    font-family: inherit;
  }
  button:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(179, 136, 255, 0.7); }
  button:active { transform: scale(0.98); }
  .skins {
    margin-top: 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 420px;
  }
  .skin {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .skin.locked { opacity: 0.25; cursor: not-allowed; }
  .skin.selected { border-color: var(--accent); transform: scale(1.1); }
  .skin::after {
    content: attr(data-lock);
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    opacity: 0.5;
    white-space: nowrap;
  }
  #hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.4;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.5s;
  }
  #hint.hidden { opacity: 0; }
  .timer-low { color: var(--danger) !important; animation: blink 0.5s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div class="pill"><span class="label">Size</span><span class="val" id="size-val">10</span></div>
    <div class="pill"><span class="label">Score</span><span class="val" id="score-val">0</span></div>
    <div class="pill"><span class="label">Time</span><span class="val" id="time-val">60</span></div>
  </div>
  <div id="stage-label">Speck</div>
  <div id="milestone"></div>
  <div id="hint">Drag to move. Swallow smaller.</div>

  <div id="overlay">
    <h1>Ghost-Gulp</h1>
    <div class="tagline">60 seconds of growth</div>
    <div class="stats" id="stats-display"></div>
    <div id="skin-unlock-display"></div>
    <div class="skins" id="skin-picker"></div>
    <br>
    <button id="start-btn">Begin</button>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('start-btn');
  const sizeVal = document.getElementById('size-val');
  const scoreVal = document.getElementById('score-val');
  const timeVal = document.getElementById('time-val');
  const stageLabel = document.getElementById('stage-label');
  const milestoneEl = document.getElementById('milestone');
  const statsDisplay = document.getElementById('stats-display');
  const skinUnlockDisplay = document.getElementById('skin-unlock-display');
  const skinPicker = document.getElementById('skin-picker');
  const hint = document.getElementById('hint');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const STAGES = [
    { min: 0,    name: 'Speck',      label: null },
    { min: 25,   name: 'Mote',       label: 'Mote' },
    { min: 50,   name: 'Wisp',       label: 'Wisp' },
    { min: 90,   name: 'Specter',    label: 'Specter' },
    { min: 150,  name: 'Phantom',    label: 'Phantom' },
    { min: 230,  name: 'Wraith',     label: 'Wraith' },
    { min: 340,  name: 'Shade',      label: 'Shade' },
    { min: 480,  name: 'Void',       label: 'Void' },
    { min: 650,  name: 'Abyss',      label: 'Abyss' },
    { min: 900,  name: 'Devourer',   label: 'Devourer' },
    { min: 1300, name: 'Apocalypse', label: 'Apocalypse' },
  ];

  const SKINS = [
    { id: 'default',  name: 'Void',     color: '#b388ff', unlock: 0,    unlockMsg: null },
    { id: 'crimson',  name: 'Crimson',  color: '#ff4d6d', unlock: 200,  unlockMsg: 'Reach size 200' },
    { id: 'emerald',  name: 'Emerald',  color: '#3ddc97', unlock: 400,  unlockMsg: 'Reach size 400' },
    { id: 'solar',    name: 'Solar',    color: '#ffb347', unlock: 600,  unlockMsg: 'Reach size 600' },
    { id: 'glacier',  name: 'Glacier',  color: '#7fd8ff', unlock: 800,  unlockMsg: 'Reach size 800' },
    { id: 'gold',     name: 'Gold',     color: '#ffd700', unlock: 1000, unlockMsg: 'Reach size 1000 (rare)' },
    { id: 'apoc',     name: 'Apoc',     color: '#ff1744', unlock: 1300, unlockMsg: 'Hit Apocalypse (ultra rare)' },
  ];

  const SAVE_KEY = 'ghost-gulp-save';
  function loadSave() {
    try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; }
    catch { return {}; }
  }
  function save(data) {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch {}
  }
  let saveData = loadSave();
  saveData.unlocked = saveData.unlocked || ['default'];
  saveData.selected = saveData.selected || 'default';
  saveData.best = saveData.best || { size: 0, score: 0 };

  const state = {
    running: false,
    time: 60,
    player: { x: W / 2, y: H / 2, vx: 0, vy: 0, r: 10, glow: 0 },
    things: [],
    particles: [],
    score: 0,
    stageIdx: 0,
    targetX: W / 2,
    targetY: H / 2,
    dragging: false,
    shakeT: 0,
    shakeAmp: 0,
    startedAt: 0,
    newlyUnlocked: [],
  };

  function getSkin(id) { return SKINS.find(s => s.id === id) || SKINS[0]; }
  function currentColor() { return getSkin(saveData.selected).color; }

  const TYPES = [
    { kind: 'dot',      color: '#8ab4ff', score: 1 },
    { kind: 'star',     color: '#ffe066', score: 2 },
    { kind: 'square',   color: '#ff9ecb', score: 2 },
    { kind: 'triangle', color: '#7fd8ff', score: 3 },
    { kind: 'hex',      color: '#b3ff99', score: 4 },
    { kind: 'ring',     color: '#d4a5ff', score: 5 },
  ];

  function spawnThing(r) {
    const edge = Math.floor(Math.random() * 4);
    let x, y;
    const pad = r + 20;
    if (edge === 0)      { x = -pad; y = Math.random() * H; }
    else if (edge === 1) { x = W + pad; y = Math.random() * H; }
    else if (edge === 2) { x = Math.random() * W; y = -pad; }
    else                 { x = Math.random() * W; y = H + pad; }
    const cx = W / 2, cy = H / 2;
    const dx = cx - x + (Math.random() - 0.5) * W * 0.6;
    const dy = cy - y + (Math.random() - 0.5) * H * 0.6;
    const d = Math.hypot(dx, dy) || 1;
    const speed = 20 + Math.random() * 50;
    const t = TYPES[Math.floor(Math.random() * TYPES.length)];
    state.things.push({
      x, y,
      vx: (dx / d) * speed,
      vy: (dy / d) * speed,
      r,
      spin: Math.random() * Math.PI * 2,
      spinV: (Math.random() - 0.5) * 2,
      kind: t.kind,
      color: t.color,
      scoreVal: t.score,
      wobble: Math.random() * Math.PI * 2,
    });
  }

  function populate() {
    const targetCount = 45;
    while (state.things.length < targetCount) {
      const pr = state.player.r;
      const roll = Math.random();
      let r;
      if (roll < 0.55) {
        r = Math.max(3, pr * (0.2 + Math.random() * 0.55));
      } else if (roll < 0.85) {
        r = pr * (0.8 + Math.random() * 0.4);
      } else {
        r = pr * (1.2 + Math.random() * 1.2);
      }
      r = Math.max(3, Math.min(r, 220));
      spawnThing(r);
    }
  }

  function resetGame() {
    state.running = true;
    state.time = 60;
    state.score = 0;
    state.stageIdx = 0;
    state.player.x = W / 2;
    state.player.y = H / 2;
    state.player.vx = 0;
    state.player.vy = 0;
    state.player.r = 10;
    state.player.glow = 0;
    state.targetX = W / 2;
    state.targetY = H / 2;
    state.things.length = 0;
    state.particles.length = 0;
    state.newlyUnlocked = [];
    state.startedAt = performance.now();
    populate();
    stageLabel.textContent = STAGES[0].name;
  }

  function showMilestone(text) {
    milestoneEl.textContent = text;
    milestoneEl.classList.remove('show');
    void milestoneEl.offsetWidth;
    milestoneEl.classList.add('show');
    setTimeout(() => milestoneEl.classList.remove('show'), 1400);
  }

  function checkStage() {
    let idx = 0;
    for (let i = 0; i < STAGES.length; i++) {
      if (state.player.r >= STAGES[i].min) idx = i;
    }
    if (idx !== state.stageIdx) {
      state.stageIdx = idx;
      stageLabel.textContent = STAGES[idx].name;
      if (STAGES[idx].label) {
        showMilestone(STAGES[idx].label);
        shake(12, 0.5);
      }
    }
  }

  function checkUnlocks() {
    for (const skin of SKINS) {
      if (!saveData.unlocked.includes(skin.id) && state.player.r >= skin.unlock) {
        saveData.unlocked.push(skin.id);
        state.newlyUnlocked.push(skin);
        save(saveData);
        showMilestone(skin.name + ' unlocked');
      }
    }
  }

  function shake(amp, time) {
    state.shakeAmp = Math.max(state.shakeAmp, amp);
    state.shakeT = Math.max(state.shakeT, time);
  }

  function burst(x, y, color, count, baseR) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 60 + Math.random() * 180;
      state.particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: 0.5 + Math.random() * 0.4,
        maxLife: 0.9,
        color,
        r: 1 + Math.random() * (baseR * 0.3),
      });
    }
  }

  function onPointerDown(e) {
    state.dragging = true;
    canvas.classList.add('dragging');
    const p = pointer(e);
    state.targetX = p.x;
    state.targetY = p.y;
    hint.classList.add('hidden');
  }
  function onPointerMove(e) {
    if (!state.dragging) return;
    const p = pointer(e);
    state.targetX = p.x;
    state.targetY = p.y;
  }
  function onPointerUp() {
    state.dragging = false;
    canvas.classList.remove('dragging');
  }
  function pointer(e) {
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX, y: t.clientY };
  }
  canvas.addEventListener('mousedown', onPointerDown);
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onPointerDown(e); }, { passive: false });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); onPointerMove(e); }, { passive: false });
  canvas.addEventListener('touchend', (e) => { e.preventDefault(); onPointerUp(e); }, { passive: false });

  function drawThing(t) {
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.spin);
    ctx.fillStyle = t.color;
    ctx.shadowColor = t.color;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    const r = t.r;
    switch (t.kind) {
      case 'dot':
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        break;
      case 'square':
        ctx.rect(-r * 0.8, -r * 0.8, r * 1.6, r * 1.6);
        break;
      case 'triangle':
        ctx.moveTo(0, -r);
        ctx.lineTo(r * 0.9, r * 0.7);
        ctx.lineTo(-r * 0.9, r * 0.7);
        ctx.closePath();
        break;
      case 'star': {
        const spikes = 5;
        for (let i = 0; i < spikes * 2; i++) {
          const rad = i % 2 === 0 ? r : r * 0.45;
          const a = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
          const x = Math.cos(a) * rad;
          const y = Math.sin(a) * rad;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        break;
      }
      case 'hex':
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          const x = Math.cos(a) * r;
          const y = Math.sin(a) * r;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        break;
      case 'ring':
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.arc(0, 0, r * 0.55, 0, Math.PI * 2, true);
        break;
    }
    ctx.fill();
    ctx.restore();
  }

  function drawPlayer() {
    const p = state.player;
    const color = currentColor();
    ctx.save();
    ctx.translate(p.x, p.y);

    const auraR = p.r * (1.6 + p.glow * 0.4);
    const grad = ctx.createRadialGradient(0, 0, p.r * 0.3, 0, 0, auraR);
    grad.addColorStop(0, color + 'cc');
    grad.addColorStop(0.5, color + '33');
    grad.addColorStop(1, color + '00');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, auraR, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#000';
    ctx.shadowColor = color;
    ctx.shadowBlur = 30 + p.glow * 40;
    ctx.beginPath();
    ctx.arc(0, 0, p.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.lineWidth = 2;
    ctx.strokeStyle = color;
    ctx.beginPath();
    ctx.arc(0, 0, p.r, 0, Math.PI * 2);
    ctx.stroke();

    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    const t = performance.now() / 1000;
    for (let i = 0; i < 2; i++) {
      const rr = p.r * (1.05 + i * 0.08 + Math.sin(t * 2 + i) * 0.02);
      ctx.beginPath();
      ctx.arc(0, 0, rr, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function update(dt) {
    const p = state.player;

    if (state.dragging) {
      const dx = state.targetX - p.x;
      const dy = state.targetY - p.y;
      const k = 10;
      p.vx += dx * k * dt;
      p.vy += dy * k * dt;
    }
    p.vx *= Math.pow(0.001, dt);
    p.vy *= Math.pow(0.001, dt);
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    const margin = p.r;
    if (p.x < margin) { p.x = margin; p.vx *= -0.3; }
    if (p.x > W - margin) { p.x = W - margin; p.vx *= -0.3; }
    if (p.y < margin) { p.y = margin; p.vy *= -0.3; }
    if (p.y > H - margin) { p.y = H - margin; p.vy *= -0.3; }

    p.glow = Math.max(0, p.glow - dt * 2);

    for (let i = state.things.length - 1; i >= 0; i--) {
      const t = state.things[i];
      t.wobble += dt * 2;
      t.x += t.vx * dt;
      t.y += t.vy * dt;
      t.spin += t.spinV * dt;
      const pad = 300 + t.r;
      if (t.x < -pad || t.x > W + pad || t.y < -pad || t.y > H + pad) {
        state.things.splice(i, 1);
        continue;
      }
      const dx = t.x - p.x;
      const dy = t.y - p.y;
      const d = Math.hypot(dx, dy);
      if (d < p.r + t.r * 0.6) {
        if (t.r < p.r * 0.95) {
          const growth = (t.r * t.r) / (p.r * 2.5);
          p.r = Math.min(p.r + growth, Math.max(W, H) * 0.55);
          state.score += t.scoreVal + Math.floor(t.r / 5);
          p.glow = Math.min(1, p.glow + 0.3);
          burst(t.x, t.y, t.color, Math.min(24, 6 + Math.floor(t.r / 3)), t.r);
          state.things.splice(i, 1);
          shake(Math.min(8, 2 + t.r / 20), 0.2);
        } else if (t.r > p.r * 1.1) {
          const push = 80 + t.r;
          const nx = -dx / (d || 1);
          const ny = -dy / (d || 1);
          p.vx += nx * push;
          p.vy += ny * push;
          burst(p.x + (t.r + p.r) * 0.5 * -nx, p.y + (t.r + p.r) * 0.5 * -ny, '#ff4d6d', 10, p.r * 0.5);
          shake(10, 0.3);
          t.vx += -nx * 100;
          t.vy += -ny * 100;
        }
      }
    }

    for (let i = state.particles.length - 1; i >= 0; i--) {
      const pt = state.particles[i];
      pt.life -= dt;
      if (pt.life <= 0) { state.particles.splice(i, 1); continue; }
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      pt.vx *= Math.pow(0.1, dt);
      pt.vy *= Math.pow(0.1, dt);
    }

    if (state.shakeT > 0) {
      state.shakeT -= dt;
      state.shakeAmp *= Math.pow(0.01, dt);
    } else {
      state.shakeAmp = 0;
    }

    populate();
    checkStage();
    checkUnlocks();

    state.time -= dt;
    if (state.time <= 0) {
      state.time = 0;
      endGame();
    }

    sizeVal.textContent = Math.floor(p.r);
    scoreVal.textContent = state.score;
    const secs = Math.ceil(state.time);
    timeVal.textContent = secs;
    if (secs <= 10) timeVal.classList.add('timer-low');
    else timeVal.classList.remove('timer-low');
  }

  function draw() {
    ctx.save();
    if (state.shakeAmp > 0.2) {
      ctx.translate(
        (Math.random() - 0.5) * state.shakeAmp,
        (Math.random() - 0.5) * state.shakeAmp
      );
    }

    ctx.fillStyle = 'rgba(5, 3, 10, 0.35)';
    ctx.fillRect(0, 0, W, H);

    for (const pt of state.particles) {
      const a = Math.max(0, pt.life / pt.maxLife);
      ctx.globalAlpha = a;
      ctx.fillStyle = pt.color;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    for (const t of state.things) drawThing(t);

    drawPlayer();

    ctx.restore();
  }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    if (state.running) update(dt);
    draw();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  function endGame() {
    state.running = false;
    const finalSize = Math.floor(state.player.r);
    const finalScore = state.score;
    if (finalSize > saveData.best.size) saveData.best.size = finalSize;
    if (finalScore > saveData.best.score) saveData.best.score = finalScore;
    save(saveData);

    const stage = STAGES[state.stageIdx];
    statsDisplay.innerHTML = `
      <div>Final Form</div>
      <span class="big">${stage.name}</span>
      <div style="margin-top:12px">Size <strong>${finalSize}</strong> · Score <strong>${finalScore}</strong></div>
      <div style="opacity:0.5;font-size:12px;margin-top:8px">
        Best: ${saveData.best.size} · ${saveData.best.score}
      </div>
    `;

    if (state.newlyUnlocked.length) {
      skinUnlockDisplay.innerHTML = state.newlyUnlocked
        .map(s => `<div class="skin-unlock">New skin: ${s.name}</div>`).join('');
    } else {
      skinUnlockDisplay.innerHTML = '';
    }

    renderSkinPicker();
    startBtn.textContent = 'Again';
    overlay.classList.remove('hidden');
  }

  function renderSkinPicker() {
    skinPicker.innerHTML = '';
    for (const skin of SKINS) {
      const unlocked = saveData.unlocked.includes(skin.id);
      const el = document.createElement('div');
      el.className = 'skin' + (unlocked ? '' : ' locked') + (saveData.selected === skin.id ? ' selected' : '');
      el.style.background = `radial-gradient(circle at 35% 30%, ${skin.color}, #000 80%)`;
      el.style.boxShadow = unlocked ? `0 0 20px ${skin.color}80` : 'none';
      el.title = unlocked ? skin.name : (skin.unlockMsg || 'Locked');
      el.dataset.lock = unlocked ? skin.name : '🔒 ' + skin.unlock;
      if (unlocked) {
        el.addEventListener('click', () => {
          saveData.selected = skin.id;
          save(saveData);
          renderSkinPicker();
        });
      }
      skinPicker.appendChild(el);
    }
  }

  startBtn.addEventListener('click', () => {
    overlay.classList.add('hidden');
    hint.classList.remove('hidden');
    resetGame();
  });

  renderSkinPicker();
  statsDisplay.innerHTML = `
    <div style="opacity:0.7">Drag void. Swallow smaller. Grow 60s.</div>
    ${saveData.best.size ? `<div style="opacity:0.5;font-size:12px;margin-top:12px">Best: ${saveData.best.size} · ${saveData.best.score}</div>` : ''}
  `;

  draw();
})();
</script>
</body>
</html>
