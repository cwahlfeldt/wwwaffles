<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tile-Tower</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #0f0f1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #fff; user-select: none; }
  #wrap { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%); touch-action: none; cursor: pointer; }
  #hud { position: absolute; top: 0; left: 0; right: 0; padding: 14px 20px; display: flex; justify-content: space-between; pointer-events: none; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.6); }
  #hud .stat { background: rgba(0,0,0,0.35); padding: 8px 14px; border-radius: 10px; backdrop-filter: blur(6px); font-size: 14px; }
  #hud .stat b { display: block; font-size: 20px; margin-top: 2px; }
  #timeBar { position: absolute; top: 70px; left: 20px; right: 20px; height: 6px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; pointer-events: none; }
  #timeFill { height: 100%; width: 100%; background: linear-gradient(90deg, #4ade80, #facc15, #ef4444); transition: width 0.1s linear; }
  #overlay { position: absolute; inset: 0; background: rgba(10,10,20,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 20px; text-align: center; }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: 42px; margin-bottom: 8px; background: linear-gradient(135deg, #fbbf24, #f472b6, #60a5fa); -webkit-background-clip: text; background-clip: text; color: transparent; }
  #overlay h2 { font-size: 28px; margin-bottom: 12px; color: #facc15; }
  #overlay p { font-size: 16px; color: #cbd5e1; margin-bottom: 6px; max-width: 360px; }
  #overlay .stats { display: flex; gap: 24px; margin: 18px 0; }
  #overlay .stats div { background: rgba(255,255,255,0.08); padding: 10px 18px; border-radius: 12px; }
  #overlay .stats span { display: block; font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
  #overlay .stats b { font-size: 24px; color: #fff; }
  #overlay button { margin-top: 18px; padding: 14px 36px; font-size: 18px; font-weight: 700; border: none; border-radius: 14px; background: linear-gradient(135deg, #f472b6, #a855f7); color: #fff; cursor: pointer; box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4); transition: transform 0.1s; }
  #overlay button:active { transform: scale(0.96); }
  #toast { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; font-weight: 800; color: #facc15; text-shadow: 0 4px 12px rgba(0,0,0,0.8); pointer-events: none; opacity: 0; transition: opacity 0.3s, transform 0.6s; }
  #toast.show { opacity: 1; transform: translate(-50%, -120%); }
  .hint { font-size: 13px; color: #94a3b8; margin-top: 10px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="hud">
    <div class="stat">SCORE<b id="score">0</b></div>
    <div class="stat">HEIGHT<b id="height">0</b></div>
    <div class="stat">BEST<b id="best">0</b></div>
  </div>
  <div id="timeBar"><div id="timeFill"></div></div>
  <div id="toast"></div>
  <div id="overlay">
    <h1>Tile-Tower</h1>
    <p>Tap to drop tiles. Match 3 colors in a row to fuse them into immovable base blocks.</p>
    <p class="hint">Build high. Stay balanced. 60 seconds per tower.</p>
    <button id="startBtn">START</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<script>
(() => {
  const { Engine, World, Bodies, Body, Composite, Events, Vector } = Matter;

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const heightEl = document.getElementById('height');
  const bestEl = document.getElementById('best');
  const timeFill = document.getElementById('timeFill');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const toast = document.getElementById('toast');

  const COLORS = [
    { name: 'red',    fill: '#ef4444', glow: '#fca5a5' },
    { name: 'green',  fill: '#22c55e', glow: '#86efac' },
    { name: 'blue',   fill: '#3b82f6', glow: '#93c5fd' },
    { name: 'yellow', fill: '#facc15', glow: '#fde68a' },
    { name: 'purple', fill: '#a855f7', glow: '#d8b4fe' },
  ];

  const TILE = 44;
  const SESSION_MS = 60000;
  const FUSE_COLOR = '#e2e8f0';

  let W = 0, H = 0, DPR = 1;
  let engine, world;
  let ground, platform;
  let tiles = [];
  let currentTile = null;
  let movingX = 0, movingDir = 1, movingSpeed = 3.2;
  let dropY = 0;
  let score = 0;
  let bestScore = +localStorage.getItem('tt_best') || 0;
  let bestHeight = 0;
  let running = false;
  let endsAt = 0;
  let lastT = 0;
  let particles = [];
  let shake = 0;

  bestEl.textContent = bestScore;

  function resize() {
    DPR = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  function makeTile(x, y, color, isFused = false) {
    const body = Bodies.rectangle(x, y, TILE, TILE, {
      restitution: 0.05,
      friction: 0.85,
      frictionStatic: 1.2,
      density: isFused ? 0.05 : 0.0018,
      isStatic: isFused,
      chamfer: { radius: 4 },
    });
    body.tileColor = color;
    body.isFused = isFused;
    body.spawnT = performance.now();
    World.add(world, body);
    tiles.push(body);
    return body;
  }

  function spawnNext() {
    const c = COLORS[Math.floor(Math.random() * COLORS.length)];
    movingX = W / 2;
    movingDir = Math.random() < 0.5 ? -1 : 1;
    currentTile = { color: c, y: dropY };
  }

  function dropCurrent() {
    if (!currentTile) return;
    const t = makeTile(movingX, currentTile.y, currentTile.color, false);
    Body.setVelocity(t, { x: 0, y: 2 });
    currentTile = null;
    setTimeout(() => { if (running) spawnNext(); }, 350);
  }

  function init() {
    engine = Engine.create({ gravity: { x: 0, y: 1.0, scale: 0.0018 } });
    world = engine.world;
    tiles = [];
    particles = [];
    score = 0;
    bestHeight = 0;

    const groundY = H - 30;
    ground = Bodies.rectangle(W / 2, groundY + 20, W * 2, 40, { isStatic: true });
    World.add(world, ground);

    const platW = 180;
    platform = Bodies.rectangle(W / 2, groundY - 8, platW, 16, {
      isStatic: false,
      density: 0.02,
      friction: 1,
      frictionStatic: 2,
      chamfer: { radius: 4 },
    });
    platform.isPlatform = true;
    World.add(world, platform);

    const pivot = Matter.Constraint.create({
      pointA: { x: W / 2, y: groundY - 8 },
      bodyB: platform,
      pointB: { x: 0, y: 0 },
      length: 0,
      stiffness: 0.9,
      damping: 0.05,
    });
    World.add(world, pivot);

    dropY = 80;

    Events.on(engine, 'collisionStart', onCollision);
  }

  function onCollision(evt) {
    for (const pair of evt.pairs) {
      const a = pair.bodyA, b = pair.bodyB;
      if ((a === ground || b === ground) && (a.tileColor || b.tileColor)) {
        const fallen = a.tileColor ? a : b;
        if (!fallen.isFused && fallen.position.y > H - 80) {
          fallen.fellOff = true;
        }
      }
    }
  }

  function checkFuse() {
    const restingTiles = tiles.filter(t => !t.isFused && Math.abs(t.velocity.y) < 0.3 && Math.abs(t.angularVelocity) < 0.05 && t.position.y < H - 60);
    const groups = {};
    for (const t of restingTiles) {
      const row = Math.round(t.position.y / TILE);
      const key = `${row}_${t.tileColor.name}`;
      (groups[key] = groups[key] || []).push(t);
    }
    for (const key in groups) {
      const g = groups[key];
      if (g.length < 3) continue;
      g.sort((a, b) => a.position.x - b.position.x);
      for (let i = 0; i <= g.length - 3; i++) {
        const a = g[i], b = g[i+1], c = g[i+2];
        const d1 = Math.abs(b.position.x - a.position.x);
        const d2 = Math.abs(c.position.x - b.position.x);
        if (d1 < TILE * 1.4 && d2 < TILE * 1.4) {
          fuseTrio(a, b, c);
          return;
        }
      }
    }
  }

  function fuseTrio(a, b, c) {
    const cx = (a.position.x + b.position.x + c.position.x) / 3;
    const cy = (a.position.y + b.position.y + c.position.y) / 3;
    const color = a.tileColor;
    [a, b, c].forEach(t => {
      burst(t.position.x, t.position.y, t.tileColor.fill);
      World.remove(world, t);
      tiles.splice(tiles.indexOf(t), 1);
    });
    const fused = Bodies.rectangle(cx, cy, TILE * 3, TILE, {
      isStatic: true,
      chamfer: { radius: 6 },
    });
    fused.tileColor = color;
    fused.isFused = true;
    fused.fusedWidth = TILE * 3;
    World.add(world, fused);
    tiles.push(fused);
    score += 50;
    shake = 8;
    showToast('FUSE +50');
  }

  function burst(x, y, color) {
    for (let i = 0; i < 14; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 2 + Math.random() * 4;
      particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1, life: 1, color });
    }
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.remove('show');
    void toast.offsetWidth;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 800);
  }

  function computeHeight() {
    let topY = H;
    for (const t of tiles) {
      if (t.position.y < topY && !t.fellOff) topY = t.position.y;
    }
    const groundY = H - 30;
    const h = Math.max(0, Math.floor((groundY - topY) / TILE));
    if (h > bestHeight) {
      score += (h - bestHeight) * 10;
      bestHeight = h;
    }
    return h;
  }

  function update(dt) {
    if (!running) return;

    const remain = endsAt - performance.now();
    timeFill.style.width = Math.max(0, (remain / SESSION_MS) * 100) + '%';
    if (remain <= 0) { endRun(); return; }

    if (currentTile) {
      movingX += movingDir * movingSpeed;
      if (movingX < TILE) { movingX = TILE; movingDir = 1; }
      if (movingX > W - TILE) { movingX = W - TILE; movingDir = -1; }
    }

    Engine.update(engine, dt);

    for (let i = tiles.length - 1; i >= 0; i--) {
      const t = tiles[i];
      if (t.position.y > H + 100 || t.position.x < -100 || t.position.x > W + 100) {
        World.remove(world, t);
        tiles.splice(i, 1);
      }
    }

    if (Math.random() < 0.04) checkFuse();

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life -= 0.025;
      if (p.life <= 0) particles.splice(i, 1);
    }

    if (shake > 0) shake *= 0.85;

    const h = computeHeight();
    scoreEl.textContent = score;
    heightEl.textContent = h;
  }

  function drawTile(body) {
    const c = body.tileColor;
    const w = body.isFused ? body.fusedWidth : TILE;
    ctx.save();
    ctx.translate(body.position.x, body.position.y);
    ctx.rotate(body.angle);
    const grad = ctx.createLinearGradient(0, -TILE/2, 0, TILE/2);
    grad.addColorStop(0, c.glow);
    grad.addColorStop(1, c.fill);
    ctx.fillStyle = grad;
    ctx.strokeStyle = body.isFused ? FUSE_COLOR : 'rgba(0,0,0,0.3)';
    ctx.lineWidth = body.isFused ? 2 : 1.5;
    roundRect(-w/2, -TILE/2, w, TILE, 5);
    ctx.fill();
    ctx.stroke();
    if (body.isFused) {
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(-w/2 + 4, -TILE/2 + 4, w - 8, 4);
    }
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawPlatform() {
    ctx.save();
    ctx.translate(platform.position.x, platform.position.y);
    ctx.rotate(platform.angle);
    const grad = ctx.createLinearGradient(0, -8, 0, 8);
    grad.addColorStop(0, '#94a3b8');
    grad.addColorStop(1, '#475569');
    ctx.fillStyle = grad;
    roundRect(-90, -8, 180, 16, 4);
    ctx.fill();
    ctx.fillStyle = '#1e293b';
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawGround() {
    const groundY = H - 30;
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, groundY, W, H - groundY);
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(W, groundY);
    ctx.stroke();
  }

  function drawCurrent() {
    if (!currentTile) return;
    const c = currentTile.color;
    ctx.save();
    ctx.globalAlpha = 0.95;
    const grad = ctx.createLinearGradient(0, currentTile.y - TILE/2, 0, currentTile.y + TILE/2);
    grad.addColorStop(0, c.glow);
    grad.addColorStop(1, c.fill);
    ctx.fillStyle = grad;
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    roundRect(movingX - TILE/2, currentTile.y - TILE/2, TILE, TILE, 5);
    ctx.fill();
    ctx.stroke();

    ctx.globalAlpha = 0.25;
    ctx.fillStyle = c.fill;
    ctx.fillRect(movingX - 1, currentTile.y + TILE/2, 2, H - currentTile.y - TILE/2 - 30);
    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    if (!world) return;
    ctx.save();
    if (shake > 0.5) {
      ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    }
    drawGround();
    if (platform) drawPlatform();
    for (const t of tiles) drawTile(t);
    drawCurrent();
    drawParticles();
    ctx.restore();
  }

  function loop(t) {
    if (!lastT) lastT = t;
    const dt = Math.min(33, t - lastT);
    lastT = t;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  function startRun() {
    overlay.classList.add('hidden');
    init();
    running = true;
    endsAt = performance.now() + SESSION_MS;
    spawnNext();
  }

  function endRun() {
    running = false;
    currentTile = null;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('tt_best', bestScore);
      bestEl.textContent = bestScore;
    }
    overlay.innerHTML = `
      <h2>Time's Up</h2>
      <div class="stats">
        <div><span>Score</span><b>${score}</b></div>
        <div><span>Height</span><b>${bestHeight}</b></div>
        <div><span>Best</span><b>${bestScore}</b></div>
      </div>
      <p>${score === bestScore && score > 0 ? 'New high score!' : 'Tap to build again.'}</p>
      <button id="startBtn">PLAY AGAIN</button>
    `;
    overlay.classList.remove('hidden');
    document.getElementById('startBtn').addEventListener('click', startRun);
  }

  canvas.addEventListener('pointerdown', (e) => {
    if (!running || !currentTile) return;
    e.preventDefault();
    dropCurrent();
  });

  startBtn.addEventListener('click', startRun);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
