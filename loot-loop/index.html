<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Loot-Loop</title>
<style>
  :root {
    --bg: #0d0b14;
    --panel: #181425;
    --ink: #e8e3d3;
    --dim: #6c6580;
    --gold: #f5c542;
    --danger: #e74c3c;
    --safe: #4ade80;
    --wall: #2a2438;
    --floor: #1f1a2e;
    --accent: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 540px;
    margin: 0 auto;
    padding: 8px;
    gap: 8px;
  }
  .hud {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    background: var(--panel);
    border-radius: 8px;
    padding: 8px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat .lbl {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .stat .val {
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat .val.gold { color: var(--gold); }
  .stat .val.safe { color: var(--safe); }
  .stat .val.timer { color: var(--ink); }
  .stat .val.timer.warn { color: var(--danger); animation: pulse 0.6s infinite; }
  .stat .val.floor { color: var(--accent); }
  @keyframes pulse { 50% { opacity: 0.5; } }

  #canvasWrap {
    position: relative;
    flex: 1;
    background: var(--panel);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 14px;
    border: 0;
    border-radius: 8px;
    background: var(--panel);
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.06s, background 0.15s;
  }
  button:active { transform: scale(0.97); }
  button.primary { background: var(--safe); color: #08210f; }
  button.danger { background: var(--accent); color: #1a0f2e; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(13, 11, 20, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 20px;
    text-align: center;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 28px;
    letter-spacing: 0.04em;
  }
  .overlay h1.win { color: var(--safe); }
  .overlay h1.lose { color: var(--danger); }
  .overlay p { color: var(--dim); font-size: 13px; line-height: 1.5; max-width: 320px; }
  .overlay .big {
    font-size: 32px;
    font-weight: 700;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
  }
  .toast {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(13, 11, 20, 0.9);
    color: var(--gold);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s, transform 0.4s;
    z-index: 5;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(8px); }
  .legend {
    font-size: 10px;
    color: var(--dim);
    text-align: center;
    padding: 4px;
  }
</style>
</head>
<body>
<div id="app">
  <div class="hud">
    <div class="stat"><div class="lbl">Time</div><div class="val timer" id="timerVal">--</div></div>
    <div class="stat"><div class="lbl">Run</div><div class="val gold" id="runVal">0</div></div>
    <div class="stat"><div class="lbl">Safe</div><div class="val safe" id="safeVal">0</div></div>
    <div class="stat"><div class="lbl">Floor</div><div class="val floor" id="floorVal">1</div></div>
  </div>

  <div id="canvasWrap">
    <canvas id="game"></canvas>
    <div class="toast" id="toast"></div>
    <div class="overlay" id="overlay">
      <h1 id="overTitle">Loot-Loop</h1>
      <p id="overMsg">Tap adjacent tiles to move. Grab loot. Reach the <span style="color:var(--safe)">exit</span> before time runs out — or lose it all.</p>
      <div class="big" id="overBig"></div>
      <button class="primary" id="overBtn">Start Run</button>
    </div>
  </div>

  <div class="controls">
    <button id="extractBtn" disabled>Extract @ Exit</button>
    <button id="deeperBtn" class="danger" disabled>Push Deeper</button>
  </div>
  <div class="legend">@ you · $ loot · ▼ exit · ✶ trap · █ wall</div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = 15, H = 19;
  let TILE = 24;

  const els = {
    timer: document.getElementById('timerVal'),
    run: document.getElementById('runVal'),
    safe: document.getElementById('safeVal'),
    floor: document.getElementById('floorVal'),
    overlay: document.getElementById('overlay'),
    overTitle: document.getElementById('overTitle'),
    overMsg: document.getElementById('overMsg'),
    overBig: document.getElementById('overBig'),
    overBtn: document.getElementById('overBtn'),
    extractBtn: document.getElementById('extractBtn'),
    deeperBtn: document.getElementById('deeperBtn'),
    toast: document.getElementById('toast'),
  };

  const TT = { WALL: 0, FLOOR: 1, LOOT: 2, EXIT: 3, TRAP: 4, REVEAL_TRAP: 5 };

  const SAFE_KEY = 'lootloop.safe';
  const BEST_KEY = 'lootloop.best';
  const SAFE_PCT = 0.10;

  const state = {
    map: null,
    px: 0, py: 0,
    timer: 0,
    runLoot: 0,
    safe: +(localStorage.getItem(SAFE_KEY) || 0),
    best: +(localStorage.getItem(BEST_KEY) || 0),
    floor: 1,
    exit: { x: 0, y: 0 },
    alive: false,
    last: 0,
    moveAnim: 0,
    moveFrom: { x: 0, y: 0 },
    onExit: false,
    trapFlash: 0,
    trapAt: { x: 0, y: 0 },
    shake: 0,
  };

  function rng(seed) {
    let s = seed >>> 0;
    return () => {
      s = (s * 1664525 + 1013904223) >>> 0;
      return s / 0xffffffff;
    };
  }

  function genMap(floor) {
    const r = rng(Date.now() ^ (floor * 9301));
    const m = Array.from({ length: H }, () => new Array(W).fill(TT.WALL));

    // BSP-ish: carve random rooms, connect with corridors
    const rooms = [];
    const tries = 14;
    for (let i = 0; i < tries; i++) {
      const rw = 3 + Math.floor(r() * 4);
      const rh = 3 + Math.floor(r() * 4);
      const rx = 1 + Math.floor(r() * (W - rw - 2));
      const ry = 1 + Math.floor(r() * (H - rh - 2));
      const room = { x: rx, y: ry, w: rw, h: rh, cx: rx + (rw >> 1), cy: ry + (rh >> 1) };
      let overlap = false;
      for (const o of rooms) {
        if (rx < o.x + o.w + 1 && rx + rw + 1 > o.x &&
            ry < o.y + o.h + 1 && ry + rh + 1 > o.y) { overlap = true; break; }
      }
      if (overlap) continue;
      rooms.push(room);
      for (let y = ry; y < ry + rh; y++)
        for (let x = rx; x < rx + rw; x++) m[y][x] = TT.FLOOR;
    }

    if (rooms.length < 2) return genMap(floor); // retry

    // connect rooms in order
    for (let i = 1; i < rooms.length; i++) {
      const a = rooms[i - 1], b = rooms[i];
      let x = a.cx, y = a.cy;
      while (x !== b.cx) { m[y][x] = TT.FLOOR; x += x < b.cx ? 1 : -1; }
      while (y !== b.cy) { m[y][x] = TT.FLOOR; y += y < b.cy ? 1 : -1; }
    }

    // place player in first room
    const start = rooms[0];
    state.px = start.cx;
    state.py = start.cy;

    // place exit in last room
    const end = rooms[rooms.length - 1];
    state.exit = { x: end.cx, y: end.cy };
    m[end.cy][end.cx] = TT.EXIT;

    // sprinkle loot — more on deeper floors
    const lootCount = 5 + Math.floor(floor * 1.4);
    let placed = 0, attempts = 0;
    while (placed < lootCount && attempts < 200) {
      attempts++;
      const x = 1 + Math.floor(r() * (W - 2));
      const y = 1 + Math.floor(r() * (H - 2));
      if (m[y][x] === TT.FLOOR && !(x === state.px && y === state.py)) {
        m[y][x] = TT.LOOT;
        placed++;
      }
    }

    // sprinkle traps — scale with floor
    const trapCount = Math.min(Math.floor(floor * 1.2), 14);
    let tp = 0, ta = 0;
    while (tp < trapCount && ta < 200) {
      ta++;
      const x = 1 + Math.floor(r() * (W - 2));
      const y = 1 + Math.floor(r() * (H - 2));
      if (m[y][x] === TT.FLOOR &&
          !(x === state.px && y === state.py) &&
          !(Math.abs(x - state.px) + Math.abs(y - state.py) < 3)) {
        m[y][x] = TT.TRAP;
        tp++;
      }
    }

    state.map = m;
    return m;
  }

  function startRun(floor = 1, carryLoot = 0) {
    state.floor = floor;
    state.runLoot = carryLoot;
    state.timer = Math.max(18, 30 - floor * 1.5) + 8;
    genMap(floor);
    state.alive = true;
    state.dying = false;
    state.onExit = false;
    state.moveAnim = 0;
    state.trapFlash = 0;
    state.shake = 0;
    els.overlay.classList.add('hidden');
    els.extractBtn.disabled = true;
    els.deeperBtn.disabled = true;
    state.last = performance.now();
    requestAnimationFrame(loop);
    updateHUD();
  }

  function endRun(reason) {
    state.alive = false;
    let title, cls, msg, big;
    if (reason === 'extract') {
      state.safe += state.runLoot;
      saveSafe();
      title = 'Extracted';
      cls = 'win';
      msg = `Banked ${state.runLoot} gold. Floor ${state.floor} cleared.`;
      big = '+' + state.runLoot;
      if (state.runLoot > state.best) { state.best = state.runLoot; localStorage.setItem(BEST_KEY, state.best); }
    } else if (reason === 'timeout' || reason === 'trap') {
      const saved = Math.floor(state.runLoot * SAFE_PCT);
      const lost = state.runLoot - saved;
      state.safe += saved;
      saveSafe();
      title = reason === 'trap' ? 'Killed by Trap' : 'Time Out';
      cls = 'lose';
      msg = `Lost ${lost} gold. Safe-Box rescued ${saved} (${Math.round(SAFE_PCT*100)}%).`;
      big = '-' + lost;
    }
    els.overTitle.textContent = title;
    els.overTitle.className = cls;
    els.overMsg.innerHTML = msg + `<br><br>Best run: ${state.best} · Safe-Box: ${state.safe}`;
    els.overBig.textContent = big;
    els.overBtn.textContent = 'New Run';
    els.overlay.classList.remove('hidden');
    state.runLoot = 0;
    state.floor = 1;
    updateHUD();
  }

  function saveSafe() { localStorage.setItem(SAFE_KEY, state.safe); }

  function tryMove(dx, dy) {
    if (!state.alive || state.dying) return;
    const nx = state.px + dx, ny = state.py + dy;
    if (nx < 0 || ny < 0 || nx >= W || ny >= H) return;
    const t = state.map[ny][nx];
    if (t === TT.WALL) return;

    state.moveFrom = { x: state.px, y: state.py };
    state.px = nx;
    state.py = ny;
    state.moveAnim = 1;

    // tile interactions
    if (t === TT.LOOT) {
      const value = 10 + Math.floor(Math.random() * 15) + state.floor * 5;
      state.runLoot += value;
      state.map[ny][nx] = TT.FLOOR;
      toast(`+${value}`);
    } else if (t === TT.TRAP) {
      state.map[ny][nx] = TT.REVEAL_TRAP;
      state.trapFlash = 1;
      state.trapAt = { x: nx, y: ny };
      state.shake = 1;
      state.dying = true;
      toast('TRAP!');
      setTimeout(() => endRun('trap'), 650);
      return;
    } else if (t === TT.EXIT) {
      state.onExit = true;
    }

    state.onExit = (state.map[state.py][state.px] === TT.EXIT);
    els.extractBtn.disabled = !state.onExit;
    els.deeperBtn.disabled = !state.onExit;
    updateHUD();
  }

  let toastTimer = null;
  function toast(msg) {
    els.toast.textContent = msg;
    els.toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => els.toast.classList.remove('show'), 700);
  }

  function updateHUD() {
    els.timer.textContent = state.alive ? Math.ceil(state.timer) : '--';
    els.timer.classList.toggle('warn', state.alive && state.timer < 6);
    els.run.textContent = state.runLoot;
    els.safe.textContent = state.safe;
    els.floor.textContent = state.floor;
  }

  function loop(now) {
    const dt = Math.min(0.05, (now - state.last) / 1000);
    state.last = now;
    if (state.alive) {
      if (!state.dying) {
        state.timer -= dt;
        if (state.timer <= 0) { state.timer = 0; updateHUD(); endRun('timeout'); return; }
        updateHUD();
      }
      if (state.moveAnim > 0) state.moveAnim = Math.max(0, state.moveAnim - dt * 8);
      if (state.trapFlash > 0) state.trapFlash = Math.max(0, state.trapFlash - dt * 1.5);
      if (state.shake > 0) state.shake = Math.max(0, state.shake - dt * 2);
    }
    draw();
    if (state.alive) requestAnimationFrame(loop);
  }

  function draw() {
    ctx.save();
    if (state.shake > 0) {
      const s = state.shake * 6;
      ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
    }
    ctx.fillStyle = getCss('--bg');
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (!state.map) { ctx.restore(); return; }

    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const t = state.map[y][x];
        const px = x * TILE, py = y * TILE;
        if (t === TT.WALL) {
          ctx.fillStyle = getCss('--wall');
          ctx.fillRect(px, py, TILE, TILE);
        } else {
          ctx.fillStyle = getCss('--floor');
          ctx.fillRect(px, py, TILE, TILE);
          ctx.strokeStyle = 'rgba(255,255,255,0.02)';
          ctx.strokeRect(px + 0.5, py + 0.5, TILE - 1, TILE - 1);

          if (t === TT.LOOT) {
            ctx.fillStyle = getCss('--gold');
            ctx.beginPath();
            ctx.arc(px + TILE/2, py + TILE/2, TILE * 0.22, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(px + TILE/2 - 2, py + TILE/2 - 2, TILE * 0.07, 0, Math.PI * 2);
            ctx.fill();
          } else if (t === TT.EXIT) {
            ctx.fillStyle = getCss('--safe');
            const cx = px + TILE/2, cy = py + TILE/2;
            ctx.beginPath();
            ctx.moveTo(cx - TILE * 0.3, cy - TILE * 0.2);
            ctx.lineTo(cx + TILE * 0.3, cy - TILE * 0.2);
            ctx.lineTo(cx, cy + TILE * 0.3);
            ctx.closePath();
            ctx.fill();
          } else if (t === TT.REVEAL_TRAP) {
            const isHit = state.trapAt.x === x && state.trapAt.y === y;
            const flash = isHit ? state.trapFlash : 0;
            if (flash > 0) {
              ctx.fillStyle = `rgba(231, 76, 60, ${0.3 + flash * 0.6})`;
              ctx.fillRect(px, py, TILE, TILE);
              const r = TILE * (0.3 + (1 - flash) * 0.7);
              ctx.strokeStyle = `rgba(255, 80, 80, ${flash})`;
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.arc(px + TILE/2, py + TILE/2, r, 0, Math.PI * 2);
              ctx.stroke();
            }
            ctx.fillStyle = getCss('--danger');
            const sp = TILE * 0.18;
            ctx.beginPath();
            ctx.moveTo(px + TILE/2, py + sp);
            ctx.lineTo(px + TILE - sp, py + TILE/2);
            ctx.lineTo(px + TILE/2, py + TILE - sp);
            ctx.lineTo(px + sp, py + TILE/2);
            ctx.closePath();
            ctx.fill();
          }
        }
      }
    }

    // adjacency highlight
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    if (state.alive) {
      for (const [dx, dy] of dirs) {
        const nx = state.px + dx, ny = state.py + dy;
        if (nx < 0 || ny < 0 || nx >= W || ny >= H) continue;
        if (state.map[ny][nx] === TT.WALL) continue;
        ctx.fillStyle = 'rgba(167, 139, 250, 0.15)';
        ctx.fillRect(nx * TILE, ny * TILE, TILE, TILE);
      }
    }

    // player (with move tween)
    const t = state.moveAnim;
    const pxF = (state.moveFrom.x * t + state.px * (1 - t)) * TILE;
    const pyF = (state.moveFrom.y * t + state.py * (1 - t)) * TILE;
    ctx.fillStyle = getCss('--accent');
    ctx.beginPath();
    ctx.arc(pxF + TILE/2, pyF + TILE/2, TILE * 0.32, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(pxF + TILE/2 - 3, pyF + TILE/2 - 3, TILE * 0.08, 0, Math.PI * 2);
    ctx.fill();

    if (state.trapFlash > 0) {
      ctx.fillStyle = `rgba(231, 76, 60, ${state.trapFlash * 0.25})`;
      ctx.fillRect(0, 0, W * TILE, H * TILE);
    }
    ctx.restore();
  }

  const cssCache = {};
  function getCss(name) {
    if (!cssCache[name]) cssCache[name] = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return cssCache[name];
  }

  function fitCanvas() {
    const wrap = document.getElementById('canvasWrap');
    const rect = wrap.getBoundingClientRect();
    const tileW = Math.floor(rect.width / W);
    const tileH = Math.floor(rect.height / H);
    TILE = Math.max(8, Math.min(tileW, tileH));
    const cssW = TILE * W, cssH = TILE * H;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = cssW * dpr;
    canvas.height = cssH * dpr;
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // recompute tile size for drawing in CSS pixels
    // (TILE already in CSS px since we divided rect by W)
    draw();
  }

  // tap-to-move: only move to tiles adjacent to player (one step at a time)
  canvas.addEventListener('pointerdown', (e) => {
    if (!state.alive) return;
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / TILE);
    const y = Math.floor((e.clientY - rect.top) / TILE);
    const dx = x - state.px, dy = y - state.py;
    if (Math.abs(dx) + Math.abs(dy) === 1) {
      tryMove(dx, dy);
    } else if (dx === 0 && dy === 0) {
      // tap self = no-op
    } else {
      // step one tile toward target along greater axis
      let sx = 0, sy = 0;
      if (Math.abs(dx) >= Math.abs(dy)) sx = Math.sign(dx); else sy = Math.sign(dy);
      tryMove(sx, sy);
    }
  });

  // keyboard for desktop
  window.addEventListener('keydown', (e) => {
    if (!state.alive) return;
    if (e.key === 'ArrowUp' || e.key === 'w') tryMove(0, -1);
    else if (e.key === 'ArrowDown' || e.key === 's') tryMove(0, 1);
    else if (e.key === 'ArrowLeft' || e.key === 'a') tryMove(-1, 0);
    else if (e.key === 'ArrowRight' || e.key === 'd') tryMove(1, 0);
    else if (e.key === 'e' && state.onExit) extract();
    else if (e.key === ' ' && state.onExit) deeper();
  });

  function extract() {
    if (!state.onExit || !state.alive) return;
    endRun('extract');
  }
  function deeper() {
    if (!state.onExit || !state.alive) return;
    // carry current loot into next floor; bigger reward potential, but timer pressure stays
    startRun(state.floor + 1, state.runLoot);
    toast(`Floor ${state.floor}`);
  }

  els.extractBtn.addEventListener('click', extract);
  els.deeperBtn.addEventListener('click', deeper);
  els.overBtn.addEventListener('click', () => startRun(1, 0));

  window.addEventListener('resize', fitCanvas);
  fitCanvas();
  updateHUD();
  draw();
})();
</script>
</body>
</html>
